name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linting
        run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type checking
        run: pnpm typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
          verbose: true

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run integration tests
        run: pnpm test:integration

  performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download previous baseline
        id: download-baseline
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          workflow: test.yml
          branch: main
          name: perf-baseline
          path: .perf-baseline
          if_no_artifact_found: ignore

      - name: Run performance tests
        id: perf-tests
        run: |
          # Run performance tests and capture output
          pnpm test:perf 2>&1 | tee perf-output.txt

          # Extract key metrics from the output for the baseline
          node -e "
            const fs = require('fs');
            const output = fs.readFileSync('perf-output.txt', 'utf8');

            // Parse performance metrics from console output
            const metrics = {};

            // Extract throughput values (format: 'X docs/sec' or 'X ops/sec' or 'X MB/sec')
            const throughputRegex = /([A-Za-z\s]+)throughput:\s*([\d,.]+)\s*(docs|ops|MB)\/sec/gi;
            let match;
            while ((match = throughputRegex.exec(output)) !== null) {
              const name = match[1].trim().toLowerCase().replace(/\s+/g, '_') + '_throughput';
              metrics[name] = parseFloat(match[2].replace(/,/g, ''));
            }

            // Extract latency values (format: 'pXX: X.XXms')
            const latencyRegex = /(p50|p95|p99):\s*([\d.]+)ms/gi;
            while ((match = latencyRegex.exec(output)) !== null) {
              const name = 'findone_' + match[1].toLowerCase();
              metrics[name] = parseFloat(match[2]);
            }

            // Extract memory growth
            const memoryRegex = /Memory growth:\s*([\d.]+)MB/i;
            const memMatch = memoryRegex.exec(output);
            if (memMatch) {
              metrics['memory_growth_mb'] = parseFloat(memMatch[1]);
            }

            metrics['timestamp'] = new Date().toISOString();
            metrics['commit'] = process.env.GITHUB_SHA || 'local';

            fs.writeFileSync('perf-results.json', JSON.stringify(metrics, null, 2));
            console.log('Captured metrics:', JSON.stringify(metrics, null, 2));
          "

      - name: Compare with baseline
        id: compare
        run: |
          node -e "
            const fs = require('fs');

            // Load current results
            const current = JSON.parse(fs.readFileSync('perf-results.json', 'utf8'));

            // Try to load baseline
            let baseline = null;
            if (fs.existsSync('.perf-baseline/perf-results.json')) {
              baseline = JSON.parse(fs.readFileSync('.perf-baseline/perf-results.json', 'utf8'));
              console.log('Baseline found from commit:', baseline.commit);
            } else {
              console.log('No baseline found - this run will establish the baseline');
              process.exit(0);
            }

            // Compare metrics
            const REGRESSION_THRESHOLD = 0.20; // 20% regression threshold
            let hasRegression = false;
            const comparisons = [];

            for (const [key, value] of Object.entries(current)) {
              if (key === 'timestamp' || key === 'commit') continue;
              if (baseline[key] === undefined) continue;

              const baselineValue = baseline[key];
              const isThroughput = key.includes('throughput');
              const isLatency = key.includes('p50') || key.includes('p95') || key.includes('p99');
              const isMemory = key.includes('memory');

              let change;
              let isRegression = false;

              if (isThroughput) {
                // For throughput, higher is better - regression if current < baseline
                change = ((value - baselineValue) / baselineValue);
                isRegression = change < -REGRESSION_THRESHOLD;
              } else if (isLatency || isMemory) {
                // For latency/memory, lower is better - regression if current > baseline
                change = ((value - baselineValue) / baselineValue);
                isRegression = change > REGRESSION_THRESHOLD;
              }

              const status = isRegression ? 'REGRESSION' : (Math.abs(change) < 0.05 ? 'OK' : 'CHANGED');
              comparisons.push({
                metric: key,
                baseline: baselineValue,
                current: value,
                change: (change * 100).toFixed(1) + '%',
                status
              });

              if (isRegression) {
                hasRegression = true;
              }
            }

            // Print comparison table
            console.log('\n=== Performance Comparison ===\n');
            console.log('Metric'.padEnd(30) + 'Baseline'.padEnd(15) + 'Current'.padEnd(15) + 'Change'.padEnd(10) + 'Status');
            console.log('-'.repeat(80));
            for (const c of comparisons) {
              const baseStr = typeof c.baseline === 'number' ? c.baseline.toFixed(2) : c.baseline;
              const currStr = typeof c.current === 'number' ? c.current.toFixed(2) : c.current;
              console.log(c.metric.padEnd(30) + baseStr.padEnd(15) + currStr.padEnd(15) + c.change.padEnd(10) + c.status);
            }
            console.log('');

            // Write comparison report
            fs.writeFileSync('perf-comparison.json', JSON.stringify({
              baseline_commit: baseline.commit,
              current_commit: current.commit,
              threshold: REGRESSION_THRESHOLD,
              comparisons,
              has_regression: hasRegression
            }, null, 2));

            if (hasRegression) {
              console.error('PERFORMANCE REGRESSION DETECTED! One or more metrics degraded by more than 20%.');
              process.exit(1);
            } else {
              console.log('All performance metrics within acceptable range.');
            }
          "

      - name: Upload performance results
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: |
            perf-results.json
            perf-comparison.json
            perf-output.txt
          retention-days: 30

      - name: Upload baseline for future runs
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: perf-baseline
          path: perf-results.json
          retention-days: 90
